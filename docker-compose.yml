services:
  caddy:
    image: caddy:2-alpine
    working_dir: /etc/caddy
    ports:
      - "8765:8765"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./terms:/etc/caddy/terms:ro
    restart: unless-stopped

  docs:
    build:
      context: .
      dockerfile: Dockerfile.zensical
    ports:
      - "8764:8764"
    volumes:
      - .:/workspace
    working_dir: /workspace
    restart: unless-stopped
    command: sh -c "zensical serve --dev-addr=0.0.0.0:8764"
